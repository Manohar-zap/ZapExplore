<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Karnataka</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
}

.wrapper {
    background: #eee;
    margin: 40px;
    padding: 20px;
}

/* Layout */
.main {
    display: flex;
    margin-top: 20px;
}

/* Map */
.map {
    flex: 2;
}

/* Info */
.info {
    flex: 1;
    padding-left: 20px;
}

/* Buttons */
.top {
    display: flex;
    justify-content: space-between;
}

iframe {
    width: 100%;
    height: 400px;
    border: none;
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="top">
        <div>Explore the Beauty of <b style="color:blue;">India</b></div>
        <div>
            <span>Link</span>
            <button onclick="window.location.href='index.html'">Back</button>
        </div>
    </div>

    <hr>

    <div class="main">

        <!-- MAP -->
        <div class="map">
            <iframe src="map.html"></iframe>
        </div>

        <!-- INFO -->
        <div class="info">
            <h3 style="color:red;">KARNATAKA</h3>
            <p>
                Karnataka is a state in southern India known for its rich culture,
                heritage, and natural landscapes. From the Western Ghats to
                historical sites like Hampi, it offers diverse attractions.
            </p>
        </div>

    </div>

</div>

</body>
</html>
