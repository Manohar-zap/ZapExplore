<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>India Fixed Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    background: transparent;
}

#map {
    height: 100vh;
    width: 100%;
    background: transparent;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map', {
    zoomControl: false,
    attributionControl: false,

    // 🔒 LOCK EVERYTHING
    dragging: false,
    scrollWheelZoom: false,
    doubleClickZoom: false,
    boxZoom: false,
    keyboard: false,
    touchZoom: false
});

// NO TILE LAYER

fetch('in.json')
.then(res => res.json())
.then(data => {

    var geoLayer = L.geoJSON(data, {

        style: {
            color: "#38bdf8",
            weight: 2,
            fillColor: "#1e293b",
            fillOpacity: 0.9
        },

        onEachFeature: function(feature, layer) {

            layer.on('mouseover', function(e){
                e.target.setStyle({
                    fillColor: "#f43f5e"
                });
            });

            layer.on('mouseout', function(e){
                geoLayer.resetStyle(e.target);
            });

            layer.on('click', function(){
                alert("Region clicked");
            });
        }

    }).addTo(map);

    // PERFECT CENTER FIT
 map.fitBounds(geoLayer.getBounds());

 // zoom in slightly
 map.zoomIn(0.49);
  // tighten view
 map.panBy([0, -20]); 
    // 🔥 LOCK ZOOM LEVEL AFTER FIT
    var fixedZoom = map.getZoom();

    map.setMinZoom(fixedZoom);
    map.setMaxZoom(fixedZoom);

    // Fix iframe rendering
    setTimeout(() => {
        map.invalidateSize();
    }, 100);
});
</script>

</body>
</html>
