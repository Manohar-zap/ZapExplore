<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>India Explorer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  overflow: hidden;
  display: flex;
  height: 100vh;
}

/* 🌍 GLOBE BACKGROUND */
#globeContainer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  display: block;
}

/* MAP */
#map {
  flex: 1;
  z-index: 0;
  display: none;
}

/* RIGHT PANEL */
#panel {
  flex: 0 0 30%;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(20px);
  color: white;
  z-index: 100;
  display: none;
  flex-direction: column;
  overflow-y: auto;
}

#panel.active {
  transform: translateX(0);
}

.panel-content {
  padding: 20px;
}

.btn {
  margin: 10px 0;
  padding: 10px;
  background: #ffffff22;
  cursor: pointer;
}

.img-box img {
  width: 100%;
}

/* TOGGLE BTN */
.toggle {
  position: absolute;
  top: 10px;
  left: 10px;
  background: black;
  color: white;
  padding: 10px;
  cursor: pointer;
  z-index: 1001;
}
</style>
</head>

<body>

<div class="toggle">Route Mode</div>

<!-- 🌍 GLOBE -->
<div id="globeContainer"></div>

<!-- 🗺️ MAP -->
<div id="map"></div>

<div id="panel">
    <div class="panel-content">
        <h2 id="title">STATE</h2>
        <p id="desc">Click a state</p>

        <div class="btn">Tradition</div>
        <div class="btn">Culture</div>
        <div class="btn">Food</div>

        <div class="img-box">
            <img id="img" src="">
        </div>
    </div>
</div>

<!-- LIBS -->
<script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* =========================
   🌍 GLOBE SETUP
========================= */

const globe = Globe()(document.getElementById('globeContainer'))
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
  .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
  .onGlobeClick(({ lat, lng }) => {
    if(lat >= 6 && lat <= 36 && lng >= 60 && lng <= 100){
      showIndiaMap();
    }
  });

// CONTROLS
const controls = globe.controls();
controls.autoRotate = true;
controls.autoRotateSpeed = 0.6;
controls.enableZoom = false;
controls.enablePan = false;

// START GLOBAL VIEW
globe.pointOfView({ lat: 20, lng: 0, altitude: 3 });

// ZOOM TO INDIA
setTimeout(() => {
  globe.pointOfView({
    lat: 22.9734,
    lng: 78.6569,
    altitude: 1.2
  }, 3000);
}, 2000);

let map;
let geoLayer;
let selectedStateLayer = null;
let dimmingLayer = null;

function showIndiaMap(){
  document.getElementById('globeContainer').style.display = 'none';
  document.getElementById('map').style.display = 'block';

  if(!map){
    map = L.map('map', {
      zoomControl: true,
      attributionControl: false,
      minZoom: 4,
      maxZoom: 9
    }).setView([22.9734, 78.6569], 5);

    // Satellite imagery layer (Esri)
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 18
    }).addTo(map);

    // Lock map to India bounds only
    map.setMaxBounds([[5, 55], [38, 105]]);

    loadIndiaStates();
  }
}

function loadIndiaStates(){
  fetch('in.json')
    .then(res => res.json())
    .then(data => {
      geoLayer = L.geoJSON(data, {
        filter: feature => {
          const p = feature.properties || {};
          const hasState = p.st_nm || p.state || p.STATE || p.ST_NM;
          const hasDistrict = p.district || p.DISTRICT || p.dist_name || p.DISTRICT_NAME;
          return Boolean(hasState) && !Boolean(hasDistrict);
        },
        style: {
          color: '#3b82f6',
          weight: 2,
          fillColor: 'transparent',
          fillOpacity: 0
        },
        onEachFeature: (feature, layer) => {
          layer.on('click', () => {
            const state = feature.properties.st_nm || feature.properties.name;
            
            // Reset previous selection
            if(selectedStateLayer){
              selectedStateLayer.setStyle({
                color: '#3b82f6',
                weight: 2,
                fillColor: 'transparent',
                fillOpacity: 0
              });
            }
            
            // Highlight new selection
            layer.setStyle({
              color: '#3b82f6',
              weight: 3,
              fillColor: '#3b82f6',
              fillOpacity: 0.15
            });
            selectedStateLayer = layer;
            
            showStatePanel(state, layer);
          });
        }
      }).addTo(map);

      // Bring state borders above dimming overlay
      geoLayer.bringToFront();
    })
    .catch(err => console.error('Failed to load in.json', err));
}

function showStatePanel(state, stateLayer){
  document.getElementById('panel').style.display = 'flex';
  document.getElementById('panel').classList.add('active');
  document.getElementById('title').innerText = state;
  document.getElementById('desc').innerText = 'State: ' + state;
  
  // Recalculate map size after panel appears
  setTimeout(() => {
    map.invalidateSize();
    // Center map on clicked state within the 70% map area
    if(stateLayer && stateLayer.getBounds){
      map.fitBounds(stateLayer.getBounds(), { padding: [50, 50] });
    }
  }, 0);
}

</script>

</body>
</html>
