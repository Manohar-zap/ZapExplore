<!DOCTYPE html>
<html lang="en">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif; }
body { overflow:hidden; height:100vh; background:#0f172a; color:white; }

#globeContainer{
    position:absolute;
    inset:0;
    z-index:2000;
    display:block;   /* ✅ SHOW GLOBE */
    background:#000;
}
#map { position:fixed; top:0; left:0; width:100%; height:100%; z-index:5; background:#0f172a; display:none; }

/* ── Side Panel ── */
#panel {
  position:fixed; top:0; right:0; width:min(520px,92vw); height:100%;
  display:none; flex-direction:column; z-index:2000; overflow:hidden;
  transform:translateX(100%); transition:transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94);
  backdrop-filter:blur(24px); background:rgba(10,18,35,0.85);
  border-left:1px solid rgba(255,255,255,0.08); box-shadow:-20px 0 60px rgba(0,0,0,0.7);
}
#panel.active { display:flex; transform:translateX(0); }
.close-btn { position:absolute; top:22px; right:22px; font-size:22px; color:rgba(255,255,255,0.45); cursor:pointer; transition:0.2s; z-index:10; }
.close-btn:hover { color:white; transform:scale(1.15); }
.panel-header { padding:36px 28px 8px; }
#panel-mode-label { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:#38bdf8; margin-bottom:6px; }
#panel-title { font-size:24px; font-weight:900; letter-spacing:0.5px; text-transform:uppercase; background:linear-gradient(90deg,#fff,#38bdf8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1.2; margin-bottom:4px; }

/* Tabs */
.tabs-container { display:flex; gap:8px; padding:14px 28px; }
.tab-btn { flex:1; padding:10px 4px; border-radius:9px; background:rgba(255,255,255,0.05); color:#94a3b8; border:1px solid rgba(255,255,255,0.1); cursor:pointer; transition:all 0.22s; text-align:center; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:1px; }
.tab-btn:hover { background:rgba(255,255,255,0.1); color:white; }
.tab-btn.active { background:linear-gradient(135deg,#3b82f6,#1d4ed8); color:white; border:none; box-shadow:0 6px 18px rgba(59,130,246,0.4); }

/* Meta chips */
.meta-row { display:flex; gap:8px; flex-wrap:wrap; padding:0 28px 14px; }
.chip { padding:5px 12px; border-radius:18px; font-size:11px; font-weight:600; }
.chip-blue  { background:rgba(56,189,248,0.1); border:1px solid rgba(56,189,248,0.25); color:#7dd3fc; }
.chip-gold  { background:rgba(251,191,36,0.1); border:1px solid rgba(251,191,36,0.25); color:#fcd34d; }
.chip span  { color:#e2e8f0; margin-left:4px; }

/* Highlight tags */
.hl-section { padding:0 28px 16px; }
.hl-section h4 { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#475569; margin-bottom:8px; }
.hl-tag { display:inline-block; margin:2px 4px 2px 0; padding:4px 11px; border-radius:14px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); font-size:12px; color:#e2e8f0; }

/* Panel content */
.panel-content { padding:0 28px; flex:1; overflow-y:auto; }
.panel-content::-webkit-scrollbar { width:4px; }
.panel-content::-webkit-scrollbar-thumb { background:rgba(56,189,248,0.2); border-radius:2px; }
#desc { color:#cbd5e1; font-size:15px; line-height:1.85; }

.img-box { padding:16px 28px 22px; border-top:1px solid rgba(255,255,255,0.07); background:rgba(0,0,0,0.18); }
.img-box img { width:100%; height:auto; border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,0.5); display:block; }

/* HERO HEADER */
.hero-header {
  position: relative;
  height: 180px;
  overflow: hidden;
  padding: 0;
}

#header-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
  filter: brightness(0.7);
}

/* DARK OVERLAY */
.header-overlay {
  position: absolute;
  inset: 0;
}

/* TEXT OVER IMAGE */
.header-content {
  position: absolute;
  bottom: 16px;
  left: 20px;
  right: 20px;
  z-index: 2;
}

/* FIX TITLE VISIBILITY */
#panel-title {
  font-size: 26px;
  font-weight: 900;
  color: white;   /* 🔥 remove gradient for readability */
  text-shadow: 0 2px 10px rgba(0,0,0,0.8);
  -webkit-text-fill-color: white;
  background: none;
}


#islandPanel {
  position: fixed;
  bottom: 24px;
  left: 20px;
  z-index: 9999;

  width: 260px;
  padding: 14px;

  border-radius: 16px;
  background: rgba(10,18,35,0.95);
  backdrop-filter: blur(12px);

  box-shadow: 0 -12px 40px rgba(0,0,0,0.6);

  display: flex;
  flex-direction: column;

  transform: translateX(0);
  transition: transform 0.3s ease;
}
/* Hide dock by default (shift left) */
#btnDock {
  left: -160px;
  transition: left 0.3s ease;
}

/* When open */
#btnDock.open {
  left: 20px;
}

/* Arrow button */
#dockToggle {
  position: fixed;

  bottom: 15px;   /* just above island */
  left: 140px;     /* align with island (20px + padding feel) */

  width: 28px;
  height: 28px;

  display: flex;
  align-items: center;
  justify-content: center;

  background: none;
  border-radius: 6px;
  border: 0px solid rgba(255,255,255,0.1);

  color: #e2e8f0;
  cursor: pointer;

  z-index: 10000;
}

#dockToggle:hover {
  transform: scale(1.1);
}

.dock-btn {
  width: 100%;
  padding: 10px 12px;

  border-radius: 10px;

  background: transparent;   /* 🔥 KEY CHANGE */
  border: 1px solid rgba(255,255,255,0.08);

  color: #e2e8f0;

  font-weight: 600;
  font-size: 13px;

  box-shadow: none;          /* 🔥 remove floating feel */
  transition: all 0.2s;
}

.dock-btn:hover {
  background: rgba(255,255,255,0.06);
  transform: translateY(-2px);
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(40px); /* start lower */
  }
  to {
    opacity: 1;
    transform: translateY(0); /* final position */
  }
}

.island-content {
  display: none;
  flex-direction: column;
  gap: 10px;
}

.island-content.active {
  display: flex;
  animation: slideUp 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
}

.island-title {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);

}
.island-content {

 animation: fadeUp 0.25s ease;

}
#islandPanel {
  display: flex;

}
.island-tabs {
  display: flex;
  flex-direction: column;   /* 🔥 stack like others */
  gap: 10px;
  margin-top: 10px;
  padding: 0;
  background: none;
}
/* hide island to left */
#islandPanel {
  transform: translateY(0);
  transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
}
/* hidden state */
#islandPanel.closed {
  transform: translateY(120%);
}
/* close button inside island */
#islandClose {
  position: absolute;
  top: 8px;
  right: 10px;

  /* make it look like part of island */
  background: rgba(0,0,0,0.4);
  padding: 4px 8px;
  border-radius: 6px;
}
#islandHandle {
  position: absolute;
  top: -14px;
  left: 50%;
  transform: translateX(-50%);

  width: 24px;
  height: 48px;

  background: rgba(10,18,35,0.95);
  border-radius: 8px;
  border: 0px solid rgba(255,255,255,0.1);

  display: flex;
  align-items: center;
  justify-content: center;

  color: #e2e8f0;
  font-size: 16px;
  cursor: pointer;

  box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  transition: 0.2s;
}

#islandHandle:hover {
  background: rgba(255,255,255,0.1);
}

#islandPanel:not(.closed) ~ #dockToggle {
  display: none;
}
/* CLOSED → show open arrow */
#islandPanel.closed #dockToggle {
  display: none;
}

/* CLOSED → hide close arrow */
#islandPanel.closed #islandHandle {
  display: none;
}

/* OPEN → show close arrow */
#islandPanel:not(.closed) #islandHandle {
  display: flex;
}

/* OPEN → hide open arrow */
#islandPanel:not(.closed) ~ #dockToggle {
  display: none;
}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
window.updateName = async () => {
  const user = window.firebaseAuth.currentUser;
  const newName = prompt("Enter new name");

  if (!newName) return;

  await updateProfile(user, {
    displayName: newName
  });

  alert("Updated!");
  showUserDashboard(); // refresh
};
import { 
  getAuth, 
  GoogleAuthProvider, 
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  setDoc, 
  getDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDc5EHSbjvq_L3uKIPrWeE3g6oKTDdobI0",
  authDomain: "zapexplore.firebaseapp.com",
  projectId: "zapexplore",
  appId: "1:400484091827:web:f5f31450f158ccf476adc6"
};

// ✅ INIT ORDER FIXED
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
window.firebaseAuth = auth;
const db = getFirestore(app);
window.db = db;
const provider = new GoogleAuthProvider();


// 🔐 LOGIN
window.googleLogin = () => {
  signInWithPopup(auth, provider)
    .then(res => {
      const user = res.user;
      document.getElementById("loginBtn").innerText = user.displayName;
      closeLogin();
    })
    .catch(err => alert(err.message));
};


// 📊 DASHBOARD LOAD
window.loadDashboard = async () => {
  const user = auth.currentUser;

  if (!user) {
    document.getElementById("loginPopup").classList.add("active");
    return;
  }

  document.getElementById("userName").innerText = user.displayName || "User";
  document.getElementById("userEmail").innerText = user.email;

  const ref = doc(window.db, "users", user.uid);
  const snap = await getDoc(ref);

  let achievements = [];

  if (snap.exists()) {
    achievements = snap.data().achievements || [];
  }

  document.getElementById("completedCount").innerText = achievements.length;

  const list = document.getElementById("achievementsList");
  list.innerHTML = "";

  achievements.forEach(a => {
    const div = document.createElement("div");
    div.innerText = "✔ " + a;
    list.appendChild(div);
  });
};


// 🏆 SAVE ACHIEVEMENT
window.addAchievement = async (name) => {
  const user = auth.currentUser;
  if (!user) return;

  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  let data = snap.exists() ? (snap.data().achievements || []) : [];

  if (!data.includes(name)) {
    data.push(name);

    await setDoc(ref, {
      name: user.displayName,
      email: user.email,
      achievements: data
    });
  }
};


// 🔄 USER STATE
onAuthStateChanged(auth, user => {
  const dashBtn = document.getElementById("dashboardBtn");

  if (user) {
    document.getElementById("loginBtn").innerText = user.displayName;
    dashBtn.style.display = "block";
  } else {
    document.getElementById("loginBtn").innerText = "Login";
    dashBtn.style.display = "none";
  }
});
</script>

<script>

function showUserDashboard(userData = {}) {
  showPanelSections('temple'); // reuse layout
  openPanel();

  document.getElementById('panel-mode-label').innerText = "PROFILE";
  document.getElementById('panel-title').innerText = "Dashboard";

  const user = window.firebaseAuth.currentUser;

  const name = user.displayName || "User";
  const email = user.email || "";
  const photo = user.photoURL || "https://i.imgur.com/6VBx3io.png";

  document.getElementById('desc').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
      <img src="${photo}" style="width:50px;height:50px;border-radius:50%;">
      <div>

      </div>
    </div>

    <div style="margin-top:10px;">
      📍 Location: <span id="userLocation">Fetching...</span>
    </div>

    <div style="margin-top:12px;">
      <b>🏆 Achievements</b>
      <div id="panelAchievements" style="margin-top:8px;"></div>
    </div>

    <div style="margin-top:16px;">
      <button onclick="updateName()">Update Name</button>
    </div>
  `;

  loadUserAchievements();
  getUserLocation();
  if (!user) {
  document.getElementById("loginPopup").classList.add("active");
  return;
}
}
async function loadUserAchievements(){
  const user = window.firebaseAuth.currentUser;
  if (!user) return;

  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  const list = document.getElementById("panelAchievements");
  list.innerHTML = "";

  let data = snap.exists() ? (snap.data().achievements || []) : [];

  if (data.length === 0) {
    list.innerHTML = "<span style='color:#64748b'>No achievements yet</span>";
    return;
  }

  data.forEach(a => {
    const div = document.createElement("div");
    div.innerText = "✔ " + a;
    list.appendChild(div);
  });
}
function getUserLocation(){
  if (!navigator.geolocation) {
    document.getElementById("userLocation").innerText = "Not supported";
    return;
  }

  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude.toFixed(3);
    const lng = pos.coords.longitude.toFixed(3);

    document.getElementById("userLocation").innerText = `${lat}, ${lng}`;
  });
}

function closeLogin(){
  document.getElementById("loginPopup").classList.remove("active");
}

═══════════════════════════════════ */
function setMode(mode) {
  if (activeMode === mode) {
    // same button clicked again → toggle off
    deactivateMode(mode);
    activeMode = null;
    return;
  }
  // turn off whatever is on
  if (activeMode) deactivateMode(activeMode);
  activeMode = mode;
  activateMode(mode);
}

function activateMode(mode) {
  document.getElementById('header-img').style.display = 'none';
  closePanel();
  clearSelectedState();
  clearRoutes();
  clearTemples();

  // ✅ HIDE main options
  document.getElementById('mainCategories').classList.remove('active');

  // reset dynamic
  document.getElementById('routeList').classList.remove('active');
  document.getElementById('templeFilterList').classList.remove('active');

  if (mode === 'route') {
    document.getElementById('routeBtn').classList.add('active');
    document.getElementById('routeList').classList.add('active');
    buildRoutePicker();
  } 
  else if (mode === 'temple') {
    document.getElementById('templeBtn').classList.add('active');
    document.getElementById('templeFilterList').classList.add('active');
    buildTemplePicker();
    renderTemples("All");
  }
}

function deactivateMode(mode) {
  document.getElementById('mainCategories').classList.add('active');
  if (mode === 'route') {
    document.getElementById('routeBtn').classList.remove('active');
    clearRoutes();
  } 
  else if (mode === 'temple') {
    document.getElementById('templeBtn').classList.remove('active');
    clearTemples();
  }

  // 🔥 just hide content, not island
document.getElementById('routeList').classList.remove('active');
document.getElementById('templeFilterList').classList.remove('active');

  closePanel();
}

function loadIndiaStates() {
  fetch('./in.json').then(r=>r.json()).then(data=>{
    geoLayer = L.geoJSON(data,{
      filter:f=>{
        const p=f.properties||{};
        return Boolean(p.st_nm||p.state||p.STATE||p.ST_NM||p.name)&&!Boolean(p.district||p.DISTRICT||p.dist_name);
      },
      style:{color:'#38bdf8',weight:1.5,fillColor:'transparent',fillOpacity:0},
      onEachFeature:(feature,layer)=>{
        layer.on('mouseover',()=>{ if(layer!==selectedStateLayer) layer.setStyle({color:'#7dd3fc',weight:2}); });
        layer.on('mouseout', ()=>{ if(layer!==selectedStateLayer) layer.setStyle({color:'#38bdf8',weight:1.5}); });
        layer.on('click',()=>{
          if (activeMode) return;
          const name=feature.properties.st_nm||feature.properties.name||feature.properties.STATE||'Unknown';
          if (selectedStateLayer) selectedStateLayer.setStyle({color:'#38bdf8',weight:1.5,fillColor:'transparent',fillOpacity:0});
          layer.setStyle({color:'#fff',weight:2.5,fillColor:'#3b82f6',fillOpacity:0.2});
          selectedStateLayer=layer;
          setTimeout(()=>{ map.invalidateSize(); map.fitBounds(layer.getBounds(),{padding:[50,50]}); },100);
          showStatePanel(name);
        });
      }
    }).addTo(map);
  }).catch(e=>console.error('GeoJSON:',e));
}

function extractSection(html, type) {
  const div = document.createElement('div');
  div.innerHTML = html;

  const sections = div.querySelectorAll('h2, h3, p');

  let current = "";
  let result = [];

  sections.forEach(el => {
    if (el.tagName === "H2" || el.tagName === "H3") {
      current = el.innerText.toLowerCase();
    } 
    else if (el.tagName === "P") {

      if (type === "history" && current.includes("history")) {
        result.push(el.innerText);
      }

      else if (type === "culture" && current.includes("culture")) {
        result.push(el.innerText);
      }

      else if (type === "tradition" &&
        (current.includes("culture") || current.includes("society") || current.includes("custom"))
      ) {
        result.push(el.innerText);
      }
    }
  });

  // fallback
  if (result.length === 0) {
    result = [...div.querySelectorAll('p')]
      .map(p => p.innerText)
      .slice(0, 3);
  }

  return result.slice(0, 5).join("<br><br>");
}

function buildRoutePicker() {
  const list=document.getElementById('routeList');
  list.innerHTML='';
  ROUTES.forEach(r=>{
    const pill=document.createElement('div');
    pill.className='route-pill';
    pill.id='rpill-'+r.id;

    pill.innerHTML=`<span style="color:${ROUTE_COLORS[r.id]};margin-right:5px;">●</span>${r.name}`;
    pill.onclick=()=>selectRoute(r.id);
    list.appendChild(pill);
  });
}

async function selectRoute(id) {
  // toggle off
  if (selectedRouteId===id) {
    clearRoutes();
    selectedRouteId=null;
    document.querySelectorAll('.route-pill').forEach(p=>p.classList.remove('on'));
    closePanel();
    return;
  }
  clearRoutes();
  document.querySelectorAll('.route-pill').forEach(p=>p.classList.remove('on'));
  selectedRouteId=id;
  document.getElementById('rpill-'+id)?.classList.add('on');

  const route=ROUTES.find(r=>r.id===id);
  const color=ROUTE_COLORS[id];

  // show panel immediately with loading state
  showRoutePanel(route, color, true);

  // Build OSRM coordinate string: from → waypoints → to
  const pts = [route.from, ...route.waypoints, route.to];
  const coordStr = pts.map(c=>c[1]+','+c[0]).join(';');
  const url = `https://router.project-osrm.org/route/v1/driving/${coordStr}?overview=full&geometries=geojson`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    if (!data.routes || !data.routes[0]) throw new Error('No route');

    const geojson = data.routes[0].geometry;
    const coords = geojson.coordinates.map(c=>[c[1],c[0]]); // OSRM → [lat,lng]

    const line = L.polyline(coords, {
      color, weight:5, opacity:0.92, lineCap:'round', lineJoin:'round'
    }).addTo(map);

    // animate dash offset on the SVG path
    animateLine(line);

    // endpoint markers
    const markers=[];
    [[route.from,'start'],[route.to,'end']].forEach(([c,pos])=>{
      const isStart=pos==='start';
      const icon=L.divIcon({
        html:`<div style="width:14px;height:14px;background:${color};border-radius:50%;border:2.5px solid #fff;box-shadow:0 0 10px ${color};"></div>`,
        iconSize:[14,14],iconAnchor:[7,7],className:''
      });
      const m=L.marker([c[0],c[1]],{icon}).addTo(map);
      m.bindTooltip(isStart?route.highlights[0]:route.highlights[route.highlights.length-1],
        {permanent:true,direction:'top',offset:[0,-10],className:'tt',opacity:1});
      markers.push(m);
    });

    activeRouteLayers[id]={line,markers};
    map.fitBounds(line.getBounds(),{padding:[60,60]});
    showRoutePanel(route, color, false);

  } catch(e) {
    console.error('OSRM error, falling back to straight line:', e);
    // fallback: straight polyline
    const pts2 = [route.from, ...route.waypoints, route.to];
    const line = L.polyline(pts2, {color,weight:4,opacity:0.85,dashArray:'10 6'}).addTo(map);
    activeRouteLayers[id]={line,markers:[]};
    map.fitBounds(line.getBounds(),{padding:[60,60]});
    showRoutePanel(route, color, false);
  }
}

function animateLine(polyline) {
  let off = 0;

  function step() {
    if (!map || !map.hasLayer(polyline)) return;

    off = (off + 0.5) % 20;

    // ✅ ONLY target this polyline's element
    const el = polyline._path;

    if (el) {
      el.style.strokeDasharray = '14 6';
      el.style.strokeDashoffset = -off;
    }

    requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
}
function clearRoutes() {
  Object.values(activeRouteLayers).forEach(rl=>{
    if(rl.line) map.removeLayer(rl.line);
    rl.markers.forEach(m=>map.removeLayer(m));
  });
  activeRouteLayers={};
  selectedRouteId=null;
  document.querySelectorAll('.route-pill').forEach(p=>p.classList.remove('on'));
}

function showRoutePanel(route, color, loading) {
  document.getElementById('panel-mode-label').innerHTML=
    `<span style="color:${color}">●</span> SCENIC ROUTE`;
  document.getElementById('panel-title').innerText=route.name;
  document.getElementById('desc').innerText= loading
    ? '⏳ Fetching real road data…'
    : route.description;

  document.getElementById('panelMeta').innerHTML=`
    <div class="chip chip-blue">📏<span>${route.distance}</span></div>
    <div class="chip chip-blue">🗓<span>${route.best_time}</span></div>
  `;
  document.getElementById('panelHl').innerHTML=
    '<h4>Key Stops</h4>'+route.highlights.map(h=>`<span class="hl-tag">${h}</span>`).join('');
  document.getElementById('header-img').style.display='none';
  showPanelSections('route');
  openPanel();
}

async function fetchWikiData(name) {
  try {
    // 🔍 Step 1: search similar names
    const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(name)}&format=json&origin=*`;
    
    const searchRes = await fetch(searchUrl);
    const searchData = await searchRes.json();

    if (!searchData.query.search.length) {
      return { text: "No info available", image: null };
    }

    // 🎯 take best match
    const bestMatch = searchData.query.search[0].title;

    // 📄 Step 2: get summary of that page
    const summaryUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(bestMatch)}`;
    
    const res = await fetch(summaryUrl);
    const data = await res.json();

    return {
      text: data.extract || "No info available",
      image: data.thumbnail?.source || null
    };

  } catch (e) {
    console.error("Wiki error:", e);
    return { text: "No info available", image: null };
  }
}

═══════════════════════════════════ */
// 🗺 ROUTE BUTTON (FAST)
document.getElementById('routeBtn').addEventListener('click', () => {
  transitionToMap();

  // ensure map is ready, then run instantly
  if (!map) {
    initLeaflet(); // force init immediately
  }

  setMode('route'); // no delay
});


// 🛕 TEMPLE BUTTON (FAST)
document.getElementById('templeBtn').addEventListener('click', async () => {
  transitionToMap();

  if (TEMPLES.length === 0) {
    await loadTemples();
    console.log("Loaded temples:", TEMPLES.length);
  }

  if (!map) {
    setTimeout(() => setMode('temple'), 200);
  } else {
    setMode('temple');
  }
});

const island = document.getElementById('islandPanel');
const toggle = document.getElementById('dockToggle');
const handle = document.getElementById('islandHandle');

// open
toggle.onclick = () => {
  island.classList.remove('closed');
};

handle.onclick = () => {
  island.classList.add('closed');
};
</script>
</body>
</html>
